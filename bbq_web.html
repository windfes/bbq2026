<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HINO 20s&amp;30s CONNECT BBQ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Bebas+Neue&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #111;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
}

.fire-row {
  font-size: 32px;
  letter-spacing: 8px;
  margin-bottom: 32px;
  animation: flicker 2s infinite alternate;
}
@keyframes flicker {
  from { opacity: 0.8; }
  to   { opacity: 1; }
}

.event-sub {
  font-size: 11px;
  letter-spacing: 0.18em;
  opacity: 0.45;
  margin-bottom: 12px;
}

.event-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(36px, 10vw, 64px);
  letter-spacing: 0.04em;
  line-height: 1.05;
  margin-bottom: 40px;
}
.event-title .s {
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 900;
  font-size: 0.78em;
}

.divider {
  width: 48px;
  height: 2px;
  background: #fff;
  opacity: 0.2;
  margin: 0 auto 40px;
}

.message {
  font-size: clamp(22px, 6vw, 32px);
  font-weight: 900;
  line-height: 1.6;
  letter-spacing: 0.04em;
  margin-bottom: 16px;
}

.sub-message {
  font-size: clamp(14px, 3.5vw, 18px);
  font-weight: 400;
  line-height: 1.8;
  opacity: 0.7;
  margin-bottom: 48px;
}

.info-block {
  border: 0.5px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 24px 28px;
  line-height: 2;
  font-size: 13px;
  opacity: 0.6;
  letter-spacing: 0.08em;
}
.info-block .date {
  font-size: 16px;
  font-weight: 700;
  opacity: 1;
  margin-bottom: 8px;
  letter-spacing: 0.1em;
}
</style>
</head>
<body>

<div class="fire-row">🔥🍖🔥</div>

<div class="event-sub">一般社団法人日野青年会議所　2026年度4月例会</div>
<div class="event-title">HINO 20<span class="s">s</span>&amp;30<span class="s">s</span><br>CONNECT BBQ</div>

<div class="divider"></div>

<div class="message">
  ご来場ありがとうございました！
</div>
<div class="sub-message">
  今後とも日野青年会議所を<br>よろしくお願いいたします！
</div>

<div class="info-block">
  <div class="date">2026.4.26 sun</div>
  <div>一般社団法人日野青年会議所</div>
  <div>2026年度コネラボ委員会</div>
</div>

</body>
</html>
